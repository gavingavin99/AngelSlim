# Global configuration of pipeline
global:
  save_path: ./output

# Model configuration
model:
  name: Qwen
  model_path: Qwen/Qwen3-8B
  trust_remote_code: true
  low_cpu_mem_usage: true
  use_cache: false
  torch_dtype: bfloat16
  device_map: auto

# Compression configuration
compression:
  name: PTQ
  quantization:
    name: fp8_static     # Supported: fp8_static, fp8_dynamic, int4_awq, int4_gptq
    bits: 8                # Quantization bits (4/8)
    quant_method:
      weight: "per-tensor"
      activation: "per-tensor"
    ignore_layers:         # Skip quantization for these layers
      - "lm_head"

# Transform configuration for SpinQuant
transform:
  name: SpinQuant
  spin_config:
    had_dim: -1
    rotation_mode: Hadamard   # "Hadamard" or "Random"
    rotation:
      - R1
      - R2
      - R4
    ignore_layers: []
  output_log: false

# Dataset for calibration
dataset:
  name: TextDataset
  data_path: ./dataset/sharegpt_gpt4_qwen/sharegpt_gpt4-qwen3_a22B_output.jsonl
  max_seq_length: 2048
  num_samples: 256
  batch_size: 1
